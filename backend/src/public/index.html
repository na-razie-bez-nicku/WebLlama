<!doctype html>
<html>
  <head>
    <title>WebLLama</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="main.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.css"
    />
  </head>
  <body class="bg-neutral-900 font-sans text-white">
    <div class="grid-cols-[max-content_1fr] inline-grid w-full">
      <div class="h-screen flex flex-col w-64 border-r border-r-neutral-600">
        <div class="p-4 border-b border-b-neutral-600">
          <button
            class="chat-item w-full bg-neutral-700 hover:bg-neutral-800 active:bg-neutral-700 text-white py-2 rounded-md"
            data-id="new"
          >
            New Chat
          </button>
          <button
            class="chat-item w-full hover:bg-neutral-800 active:bg-neutral-700 text-white py-2 rounded-md"
            data-id="artifacts"
          >
            Artifacts
          </button>
        </div>

        <div id="chats" class="flex-1 overflow-y-auto p-2 space-y-2">
        </div>

        <div class="p-4 border-t border-t-neutral-600">
          <div class="text-sm">Guest</div>
        </div>
      </div>
      <div class="h-screen flex flex-col">
        <div class="p-4 border-b border-b-neutral-600" id="header">Header</div>

        <div id="messages" class="flex-1 overflow-y-auto p-4">
          
        </div>

        <div class="p-4 border-t border-neutral-600">
          <div
            class="rounded-3xl bg-neutral-600 p-2 w-full flex items-end gap-2"
          >
            <button class="text-2xl px-2">+</button>

            <textarea
              id="chatInput"
              rows="1"
              class="flex-1 bg-transparent resize-none overflow-hidden outline-none"
              placeholder="Napisz..."
            ></textarea>

            <button class="text-2xl px-2">↑</button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
